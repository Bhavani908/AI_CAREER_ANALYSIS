<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Resume History — CareerAI</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>

<body style="background: var(--bg);
min-height:100vh;">

<nav class="navbar">

<div class="nav-logo">

🎯 CareerAI

</div>

<div class="nav-links">

<a href="/dashboard">

Analyze

</a>

<a href="/history"
class="active">

History

</a>

<a href="/logout"
class="nav-logout">

Sign out

</a>

</div>

</nav>

<div class="page-wrap">

<div class="page-header">

<h1>

Resume History

</h1>

<p>

All your previous resume analyses.

</p>

</div>

{% if rows %}

<div class="history-table-wrap">

<table class="history-table">

<thead>

<tr>

<th>Resume</th>

<th>Role</th>

<th>Score</th>

<th>Date</th>

</tr>

</thead>

<tbody>

{% for r in rows %}

<tr>

<td>

{{ r.filename }}

</td>

<td>

{{ r.role }}

</td>

<td>

{{ r.match_score }}%

</td>

<td>

{{ r.created_at }}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% else %}

<div class="empty-state">

No history yet

</div>

{% endif %}

</div>

</body>

</html>
