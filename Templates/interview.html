<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Interview — CareerAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="interview-page">

  <nav class="navbar">
    <div class="nav-logo">🎯 CareerAI <span class="dot"></span></div>
    <div class="nav-links">
      <a href="/dashboard">Analyze</a>
      <a href="/history">History</a>
      <a href="/logout" class="nav-logout">Sign out</a>
    </div>
  </nav>

  <div class="interview-container">

    <!-- Progress -->
    <div class="progress-bar-wrap">
      <div class="progress-info">
        <span>Question {{ current }} of {{ total }}</span>
        <span>Mock Interview</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width: {{ (current / total * 100)|int }}%"></div>
      </div>
    </div>

    <!-- Question Card -->
    <div class="question-card">
      <div class="question-label">Interview Question</div>
      <div class="question-text">{{ question }}</div>
    </div>

    <!-- Answer Card -->
    <div class="answer-card">

      <!-- Tabs -->
      <div class="answer-tabs">
        <button class="answer-tab active" onclick="switchTab('text', this)">✍️ Type Answer</button>
        <button class="answer-tab" onclick="switchTab('voice', this)">🎤 Voice Answer</button>
      </div>

      <!-- Text Section -->
      <div class="answer-section active" id="section-text">
        <textarea class="text-answer" id="textInput" placeholder="Type your answer here..."></textarea>
        <button class="btn-submit" onclick="submitText()">Submit Answer →</button>
      </div>

      <!-- Voice Section -->
      <div class="answer-section" id="section-voice">
        <div class="voice-controls">
          <button class="record-btn" id="recordBtn" onclick="toggleRecording()" title="Start recording">🎤</button>
          <div class="record-status" id="recordStatus">Click to start recording</div>
        </div>
      </div>

      <!-- Feedback -->
      <div class="feedback-toast" id="feedbackToast">
        <div class="feedback-score" id="feedbackScore"></div>
        <div class="feedback-text" id="feedbackText"></div>
      </div>

    </div>
  </div>

  <script>
    let mediaRecorder, audioChunks = [], isRecording = false;

    function switchTab(tab, el) {
      document.querySelectorAll('.answer-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.answer-section').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('section-' + tab).classList.add('active');
    }

    async function submitText() {
      const answer = document.getElementById('textInput').value.trim();
      if (!answer) return;
      const fd = new FormData();
      fd.append('answer_text', answer);
      const res = await fetch('/submit_answer', { method: 'POST', body: fd });
      const data = await res.json();
      showFeedback(data.score, data.feedback, data.next);
    }

    function showFeedback(score, feedback, next) {
      const toast = document.getElementById('feedbackToast');
      document.getElementById('feedbackScore').textContent = 'Score: ' + score + '/30';
      document.getElementById('feedbackText').textContent = feedback;
      toast.classList.add('show');
      setTimeout(() => { window.location.href = next; }, 2200);
    }

    async function toggleRecording() {
      const btn = document.getElementById('recordBtn');
      const status = document.getElementById('recordStatus');

      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          mediaRecorder.start();
          isRecording = true;
          btn.classList.add('recording');
          btn.textContent = '⏹';
          btn.title = 'Stop recording';
          status.className = 'record-status live';
          status.innerHTML = '<span class="dot-live"></span> Recording... click to stop';
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        } catch(e) {
          status.textContent = 'Microphone access denied.';
        }
      } else {
        mediaRecorder.stop();
        isRecording = false;
        btn.classList.remove('recording');
        btn.textContent = '🎤';
        btn.title = 'Start recording';
        status.className = 'record-status';
        status.textContent = 'Processing...';

        mediaRecorder.onstop = async () => {
          const blob = new Blob(audioChunks, { type: 'audio/wav' });
          const fd = new FormData();
          fd.append('audio_data', blob);
          const res = await fetch('/submit_voice', { method: 'POST', body: fd });
          const data = await res.json();
          status.textContent = 'Done!';
          showFeedback(data.score, data.feedback, data.next);
        };
      }
    }
  </script>

</body>
</html>
